<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="인지 실험">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">

    <title>알림 방해 인지 실험 (실행 화면)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #ffffff !important; 
            color: #1f2937; 
            overflow: hidden;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #ffffff; 
        }
        .screen.active { display: flex; }

        .math-text {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            user-select: none;
            text-align: center;
        }

        /* 📱 알림 배너 공통 및 OS별 애니메이션 */
        .modern-pill-notification {
            position: absolute;
            top: 0; 
            left: 50%;
            transform: translate(-50%, -150px);
            z-index: 9999;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .modern-pill-notification.anim-android { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modern-pill-notification.anim-ios { transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15); }
        .modern-pill-notification.show { transform: translate(-50%, calc(env(safe-area-inset-top, 10px) + 5px)); }

        /* 🤖 안드로이드 스타일 (기존 짙은 회색) */
        .style-android {
            width: 92%; max-width: 420px;
            background-color: #8F8F8F;
            border-radius: 9999px; 
            padding: 6px 14px 6px 8px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* 🍎 아이폰 스타일 (라이트 글래스모피즘) */
        .style-ios {
            width: 95%; max-width: 420px;
            background-color: rgba(240, 240, 240, 0.8);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            backdrop-filter: blur(25px) saturate(200%);
            border-radius: 26px; 
            padding: 10px 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 0.5px solid rgba(255, 255, 255, 0.5); 
        }

        .tap-effect:active {
            opacity: 0.7;
            transform: scale(0.96);
        }
        
        .color-btn { 
            transition: transform 0.1s, background-color 0.2s; 
            font-size: 2.5rem !important; 
        }
        .color-btn:active { transform: scale(0.92); }

        .custom-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            color: #1f2937;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .custom-input:focus {
            outline: none;
            border-color: #4B7DD1;
            box-shadow: 0 0 0 1px #4B7DD1;
            background-color: #ffffff;
        }
        .custom-input::placeholder { color: #9ca3af; }
    </style>
</head>
<body>

    <!-- 1. 알림 팝업 UI -->
    <div id="notification" class="modern-pill-notification"></div>

    <!-- 2. 시작 화면 -->
    <div id="screen-intro" class="screen active p-6 overflow-y-auto">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full py-6">
            <h1 class="text-3xl font-bold mb-3 text-gray-800 mt-4">실험 검사</h1>
            <p class="text-gray-500 mb-4 text-center text-[14px] leading-relaxed">
                화면 중앙에 나타나는 <strong>'수식의 정답'</strong>을 계산하여<br>
                하단의 4개 버튼 중 알맞은 숫자를 빠르게 누르세요.
            </p>

            <!-- 🛠️ 테스트용 OS 강제 선택 패널 -->
            <div class="w-full bg-blue-50/50 border border-blue-100 rounded-xl p-3.5 mb-6 shadow-sm">
                <label class="block text-[11px] font-bold text-blue-800 mb-2.5 text-center tracking-tight">🛠️ [테스트] 노출할 알림 스타일 강제 선택</label>
                <div class="flex gap-2 justify-center">
                    <button id="btn-os-auto" class="tap-effect flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600 text-white shadow-sm transition-colors border border-blue-600">자동 감지</button>
                    <button id="btn-os-ios" class="tap-effect flex-1 py-2 text-xs font-bold rounded-lg bg-white text-gray-500 border border-gray-200 shadow-sm transition-colors hover:bg-gray-50">아이폰</button>
                    <button id="btn-os-android" class="tap-effect flex-1 py-2 text-xs font-bold rounded-lg bg-white text-gray-500 border border-gray-200 shadow-sm transition-colors hover:bg-gray-50">안드로이드</button>
                </div>
                <p class="text-center text-[10px] text-blue-600/70 mt-2.5 font-medium">현재 적용된 상태: <strong id="current-os-span" class="text-blue-800 font-mono"></strong></p>
            </div>
            
            <div class="w-full bg-gray-50 p-5 rounded-2xl mb-8 border border-gray-200 shadow-sm">
                <p class="text-center mb-5">
                    <span class="text-pink-500/90 text-[12px] font-medium">(※ 입력된 정보는 실험용으로만 쓰이며 즉시 파기됩니다.)</span>
                </p>
                
                <div class="space-y-4">
                    <div>
                        <label for="exp-number" class="block text-[12.5px] font-medium text-gray-600 mb-1.5 ml-1">1. 실험번호 (연구자 안내)</label>
                        <input type="text" id="exp-number" class="custom-input py-3.5" placeholder="예: 1000">
                    </div>
                    <div>
                        <label for="lover-name" class="block text-[12.5px] font-medium text-gray-600 mb-1.5 ml-1">2. 가장 자주 카톡을 하는 지인/애인</label>
                        <input type="text" id="lover-name" class="custom-input py-3.5" placeholder="예: 우리공주, 김철수">
                    </div>
                </div>
            </div>

            <button id="btn-start" class="tap-effect w-full py-4 bg-gray-800 text-white font-bold rounded-2xl text-xl shadow-md flex-shrink-0">
                실험 시작
            </button>
            <button id="btn-fullscreen" class="mt-6 text-sm text-gray-400 underline tap-effect flex-shrink-0">
                전체화면으로 전환
            </button>
        </div>
    </div>

    <!-- 3. 대기 화면 -->
    <div id="screen-fixation" class="screen justify-center items-center">
        <div class="text-5xl text-gray-400 font-light">+</div>
    </div>

    <!-- 4. 본 실험 화면 -->
    <div id="screen-task" class="screen">
        <div class="pt-12 px-6 flex justify-between items-center z-10">
            <div class="w-full bg-gray-200 rounded-full h-1.5">
                <div id="progress-bar" class="bg-gray-600 h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <span class="text-xs text-gray-500 font-bold ml-4 whitespace-nowrap"><span id="trial-counter">1</span> / <span id="total-trials">20</span></span>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div id="target-equation" class="math-text text-gray-800"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-5 pb-10">
            <button id="ans-btn-0" class="color-btn py-12 rounded-[1.8rem] shadow-sm font-bold text-gray-800 bg-gray-100 hover:bg-gray-200 border border-gray-200"></button>
            <button id="ans-btn-1" class="color-btn py-12 rounded-[1.8rem] shadow-sm font-bold text-gray-800 bg-gray-100 hover:bg-gray-200 border border-gray-200"></button>
            <button id="ans-btn-2" class="color-btn py-12 rounded-[1.8rem] shadow-sm font-bold text-gray-800 bg-gray-100 hover:bg-gray-200 border border-gray-200"></button>
            <button id="ans-btn-3" class="color-btn py-12 rounded-[1.8rem] shadow-sm font-bold text-gray-800 bg-gray-100 hover:bg-gray-200 border border-gray-200"></button>
        </div>
    </div>

    <!-- 5. 결과 화면 -->
    <div id="screen-result" class="screen p-6">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full text-center">
            <div class="w-24 h-24 bg-[#187A1E] text-white rounded-full flex items-center justify-center text-5xl mb-8 mx-auto shadow-lg">✓</div>
            <h2 class="text-3xl font-bold mb-3 text-gray-800">실험 종료</h2>
            <p class="text-gray-500 mb-12 text-[15px]">수고하셨습니다. 측정이 완료되었습니다.</p>
            
            <div class="w-full space-y-4">
                <button id="btn-download-local" class="tap-effect w-full py-4 bg-gray-800 text-white font-bold rounded-2xl text-lg shadow-md">
                    내 기록 다운로드 (CSV)
                </button>
                <button id="btn-restart" class="tap-effect w-full py-4 bg-white text-gray-800 font-bold rounded-2xl text-lg border border-gray-300 shadow-sm">
                    다시 하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://invtltgtuhhqzaqjkkfj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_n-VzUf2TqU-UnSJFJPYsYQ_bXN2j9g8';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const CONFIG = {
            totalTrials: 20,             
            fixationTime: 600,            
            notiDuration: 4000            
        };
        
        // 🌟 이미지 경로 변수에 관계성(Lover) 프로필 이미지 추가
        const IMAGE_URLS = {
            adProfile: './ad_profile.jpg',
            loverProfile: './kakaotalk_profile.png' // 💡 추가됨
        };

        function preloadImages() {
            Object.values(IMAGE_URLS).forEach(url => {
                const img = new Image(); img.src = url;
            });
        }

        let userDeviceType = "Unknown";

        // 💡 접속 기종(OS) 판별 함수
        function detectDevice() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1) {
                return 'iOS_Apple';
            } else if (ua.indexOf('android') > -1) {
                if (ua.indexOf('samsungbrowser') > -1 || ua.indexOf('sm-') > -1) {
                    return 'Android_Samsung';
                }
                return 'Android_Other';
            } else {
                return 'PC_or_Unknown';
            }
        }

        // 상태 업데이트 렌더링 함수
        function updateOsStatusText() {
            document.getElementById('current-os-span').innerText = userDeviceType;
        }

        window.onload = () => {
            preloadImages(); // 🌟 이미지 미리 불러오기 함수도 다시 실행!
            userDeviceType = detectDevice();
            updateOsStatusText();
        };

        // 🛠️ 테스트용 OS 강제 선택 버튼 로직
        const btnOsAuto = document.getElementById('btn-os-auto');
        const btnOsIos = document.getElementById('btn-os-ios');
        const btnOsAndroid = document.getElementById('btn-os-android');

        function resetOsButtons() {
            [btnOsAuto, btnOsIos, btnOsAndroid].forEach(btn => {
                btn.className = 'tap-effect flex-1 py-2 text-xs font-bold rounded-lg bg-white text-gray-500 border border-gray-200 shadow-sm transition-colors hover:bg-gray-50';
            });
        }

        function setOsButtonActive(btn) {
            btn.className = 'tap-effect flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600 text-white shadow-sm transition-colors border border-blue-600';
        }

        btnOsAuto.addEventListener('click', () => {
            resetOsButtons();
            setOsButtonActive(btnOsAuto);
            userDeviceType = detectDevice();
            updateOsStatusText();
        });

        btnOsIos.addEventListener('click', () => {
            resetOsButtons();
            setOsButtonActive(btnOsIos);
            userDeviceType = 'iOS_Apple'; // 아이폰 강제 설정
            updateOsStatusText();
        });

        btnOsAndroid.addEventListener('click', () => {
            resetOsButtons();
            setOsButtonActive(btnOsAndroid);
            userDeviceType = 'Android_Samsung'; // 안드로이드 강제 설정
            updateOsStatusText();
        });


        // 🌟 아이콘 설정 (광고 프사, 지인 프사, 우측 뱃지)
        const ICONS = {
            kakaoAd: `<img src="${IMAGE_URLS.adProfile}" class="w-full h-full object-cover">`,
            kakaoLover: `<img src="${IMAGE_URLS.loverProfile}" class="w-full h-full object-cover">`, // 💡 기존 SVG에서 이미지로 교체
            kakaoBadge: `<svg class="w-[11px] h-[11px] text-[#371d1e]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 3.185-9 7.1 0 2.525 1.69 4.75 4.19 5.92-.3 1.13-1.12 3.85-1.15 4.02-.03.17.1.18.23.09.1-.06 2.76-1.8 3.92-2.61.88.16 1.82.25 2.81.25 4.97 0 9-3.185 9-7.1S16.97 3 12 3z"/></svg>`
        };

        const TRIAL_SCENARIO = [
            { eq: "15 + 23", ans: 38, choices: [48, 38, 27, 39], noti: "None" },
            { eq: "14 × 3",  ans: 42, choices: [42, 32, 52, 45], noti: "None" },
            { eq: "34 + 18", ans: 52, choices: [42, 62, 52, 53], noti: "None" },
            { eq: "21 × 4",  ans: 84, choices: [74, 84, 94, 85], noti: "None" },
            { eq: "45 + 27", ans: 72, choices: [62, 73, 82, 72], noti: "None" },
            { eq: "13 × 6",  ans: 78, choices: [78, 68, 88, 79], noti: "None" },
            { eq: "52 + 19", ans: 71, choices: [81, 71, 61, 72], noti: "None" },
            { eq: "17 × 5",  ans: 85, choices: [75, 95, 85, 86], noti: "None" },
            { eq: "28 + 35", ans: 63, choices: [63, 53, 73, 64], noti: "None" },
            { eq: "24 × 3",  ans: 72, choices: [82, 72, 62, 74], noti: "None" },   
            { eq: "41 + 22", ans: 63, choices: [53, 73, 63, 65], noti: "Target" }, // 11번 문제
            { eq: "16 × 4",  ans: 64, choices: [64, 54, 74, 66], noti: "None" },
            { eq: "37 + 16", ans: 53, choices: [63, 43, 54, 53], noti: "None" },
            { eq: "18 × 3",  ans: 54, choices: [54, 64, 44, 56], noti: "None" },
            { eq: "56 + 25", ans: 81, choices: [71, 81, 91, 83], noti: "None" },
            { eq: "12 × 7",  ans: 84, choices: [94, 74, 84, 86], noti: "None" },
            { eq: "29 + 44", ans: 73, choices: [73, 63, 83, 75], noti: "None" },
            { eq: "23 × 5",  ans: 115, choices: [105, 125, 115, 117], noti: "None" },
            { eq: "48 + 33", ans: 81, choices: [91, 81, 71, 83], noti: "None" },   
            { eq: "19 × 6",  ans: 114, choices: [114, 104, 124, 116], noti: "None" }
        ];

        let currentTrial = 0;
        let trialData = [];
        let trialStartTime = 0;
        
        let isNotiVisible = false;
        let notiTimeout = null;

        let expNum = "";
        let loverName = "";
        let adName = "카카오이모티콘"; 
        let dynamicNotifications = {}; 

        let currentEquation = "";
        let currentCorrectAnswer = 0;

        const screens = {
            intro: document.getElementById('screen-intro'),
            fixation: document.getElementById('screen-fixation'),
            task: document.getElementById('screen-task'),
            result: document.getElementById('screen-result')
        };
        const notiEl = document.getElementById('notification');
        const ansBtns = [
            document.getElementById('ans-btn-0'), document.getElementById('ans-btn-1'),
            document.getElementById('ans-btn-2'), document.getElementById('ans-btn-3')
        ];

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        // 🌟 핵심: 기종(OS)에 따라 알림 UI를 다르게 렌더링하는 로직
        function showSpecificNotification(type) {
            if (isNotiVisible || type === "None" || !dynamicNotifications[type]) return;
            
            const noti = dynamicNotifications[type];
            const isIOS = userDeviceType.includes('iOS'); // 아이폰인지 확인

            if (isIOS) {
                // 🍎 아이폰(iOS) 스타일 렌더링 (캡처본 완벽 적용)
                notiEl.className = 'modern-pill-notification anim-ios style-ios';
                notiEl.innerHTML = `
                    <div class="flex items-center w-full">
                        <div class="relative w-[54px] h-[54px] flex-shrink-0">
                            <div class="w-full h-full rounded-full ${noti.iconBg} overflow-hidden flex items-center justify-center border border-gray-100/50">
                                ${noti.iconHtml}
                            </div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-[20px] h-[20px] bg-[#FEE500] rounded-[7px] flex items-center justify-center border-[2px] border-white/80 shadow-sm">
                               ${ICONS.kakaoBadge}
                            </div>
                        </div>
                        <div class="ml-3.5 flex-1 flex flex-col justify-center overflow-hidden">
                            <div class="flex items-center justify-between w-full">
                                <span class="text-[15px] font-bold text-gray-900 tracking-tight leading-tight truncate pr-2">${noti.title}</span>
                                <span class="text-[13px] text-gray-500 font-normal flex-shrink-0">지금</span>
                            </div>
                            <span class="text-[15px] text-gray-800 truncate font-normal tracking-tight leading-tight mt-1">${noti.msg}</span>
                        </div>
                    </div>
                `;
            } else {
                // 🤖 안드로이드 스타일 렌더링 (기존 헤즈업 형태)
                notiEl.className = 'modern-pill-notification anim-android style-android';
                notiEl.innerHTML = `
                    <div class="flex items-center w-full">
                        <div class="w-[24px] h-[24px] rounded-full flex-shrink-0 ${noti.iconBg} overflow-hidden flex items-center justify-center">
                            ${noti.iconHtml}
                        </div>
                        <div class="ml-2 flex-1 overflow-hidden whitespace-nowrap flex items-center">
                            <span class="text-[13px] font-bold text-white tracking-tight">${noti.title}</span>
                            <span class="text-[13px] text-white truncate font-normal tracking-tight ml-1.5">${noti.msg}</span>
                        </div>
                        <svg class="w-3.5 h-3.5 text-white opacity-70 ml-1.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                `;
            }
            
            notiEl.classList.add('show');
            isNotiVisible = true;

            if (notiTimeout) clearTimeout(notiTimeout);
            notiTimeout = setTimeout(() => { hideNotification(); }, CONFIG.notiDuration);
        }

        function hideNotification() {
            notiEl.classList.remove('show');
            isNotiVisible = false;
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            expNum = document.getElementById('exp-number').value.trim();

            if (expNum === '1111') {
                window.location.href = 'admin.html';
                return;
            }

            expNum = expNum || `TEST_${Math.floor(Math.random()*1000)}`;
            loverName = document.getElementById('lover-name').value.trim() || `김철수`;

            // 그룹별 알림 텍스트 및 데이터 세팅 (UI 구성은 위 함수에서 처리됨)
            dynamicNotifications = {
                'Lover': { 
                    type: 'Lover', 
                    sender: loverName, 
                    iconHtml: ICONS.kakaoLover, // 💡 교체한 이미지 삽입
                    iconBg: 'bg-white',         // 💡 이미지가 깔끔하게 들어가도록 흰색 배경으로 통일
                    title: loverName, 
                    msg: `머하고 잇어?` 
                },
                'Ad': { 
                    type: 'Ad', 
                    sender: adName, 
                    iconHtml: ICONS.kakaoAd, 
                    iconBg: 'bg-white', 
                    title: adName, 
                    msg: `(광고) 오늘은 이모티콘 무료로 받는날!`
                }
            };

            currentTrial = 0;
            trialData = [];
            document.getElementById('progress-bar').style.width = '0%';
            
            hideNotification();
            nextTrial();
        });

        function nextTrial() {
            if (currentTrial >= CONFIG.totalTrials) {
                endExperiment();
                return;
            }
            currentTrial++;
            document.getElementById('trial-counter').textContent = currentTrial;
            document.getElementById('progress-bar').style.width = `${(currentTrial / CONFIG.totalTrials) * 100}%`;
            
            showScreen('fixation');
            setTimeout(() => { presentStimulus(); }, CONFIG.fixationTime);
        }

        function presentStimulus() {
            showScreen('task');
            
            const currentTrialData = TRIAL_SCENARIO[currentTrial - 1];
            currentEquation = currentTrialData.eq;
            currentCorrectAnswer = currentTrialData.ans;

            document.getElementById('target-equation').textContent = currentEquation;

            for(let i=0; i<4; i++) {
                ansBtns[i].textContent = currentTrialData.choices[i];
                ansBtns[i].setAttribute('data-value', currentTrialData.choices[i]); 
            }

            if (currentTrialData.noti !== "None") {
                let numMatched = expNum.match(/\d+/);
                let num = numMatched ? parseInt(numMatched[0], 10) : 1; 
                let notiType = (num % 2 === 0) ? "Lover" : "Ad"; 

                setTimeout(() => { 
                    showSpecificNotification(notiType); 
                }, 500); 
            }

            trialStartTime = performance.now();
        }

        ansBtns.forEach(btn => {
            btn.addEventListener('touchstart', handleInput, {passive: false});
            btn.addEventListener('mousedown', handleInput); 
        });

        function handleInput(e) {
            if (screens.task.classList.contains('active') === false) return;
            e.preventDefault(); 

            const reactionTime = Math.round(performance.now() - trialStartTime);
            const selectedValue = parseInt(e.currentTarget.getAttribute('data-value')); 
            const isCorrect = (selectedValue === currentCorrectAnswer);

            const currentTrialData = TRIAL_SCENARIO[currentTrial - 1];
            let loggedNotiType = "None";
            let loggedNotiSender = "None";
            let phaseNum = 0; 

            if (currentTrialData.noti !== "None") {
                let numMatched = expNum.match(/\d+/);
                let num = numMatched ? parseInt(numMatched[0], 10) : 1; 
                
                loggedNotiType = (num % 2 === 0) ? "Lover" : "Ad"; 
                loggedNotiSender = dynamicNotifications[loggedNotiType] ? dynamicNotifications[loggedNotiType].sender : "None";
                phaseNum = 1; 
            }

            trialData.push({
                expNum: expNum, loverName: loverName, adName: adName,
                trialNumber: currentTrial, equation: currentEquation,
                correctAnswer: currentCorrectAnswer, chosenAnswer: selectedValue,
                notificationType: loggedNotiType, 
                notificationSender: loggedNotiSender,
                isCorrect: isCorrect ? 1 : 0, reactionTimeMs: reactionTime,
                deviceOS: userDeviceType 
            });

            if (db) {
                db.from('Trials').insert([{ 
                    participant_id: expNum,
                    exp_number: expNum,
                    lover_name: loverName,
                    ad_name: adName,
                    notification_type: loggedNotiType,
                    notification_sender: loggedNotiSender,
                    trial_number: currentTrial, 
                    notification_phase: phaseNum, 
                    reaction_time_ms: reactionTime,
                    is_correct: isCorrect,
                    device_os: userDeviceType 
                }]).then(({ error }) => {
                    if (error) console.error('DB 전송 에러:', error);
                });
            }

            nextTrial();
        }

        function endExperiment() {
            hideNotification();
            showScreen('result');
        }

        notiEl.addEventListener('click', () => {
            hideNotification();
            if(notiTimeout) clearTimeout(notiTimeout);
        });

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('btn-restart').addEventListener('click', () => { showScreen('intro'); });

        document.getElementById('btn-download-local').addEventListener('click', () => {
            if (trialData.length === 0) return;
            
            const headers = ['Exp_Num', 'Group_Type', 'Question', 'Equation', 'Correct_Answer', 'Chosen_Answer', 'Noti_Fired', 'Correct', 'Reaction_Time_ms', 'Device_OS'];
            const csvRows = [headers.join(',')];

            trialData.forEach(row => {
                let numMatched = row.expNum.match(/\d+/);
                let num = numMatched ? parseInt(numMatched[0], 10) : 1;
                let groupType = (num % 2 === 0) ? '관계성' : '광고성';
                let notiFired = (row.notificationType !== 'None') ? 'O' : 'X';

                const values = [
                    row.expNum, groupType, row.trialNumber, row.equation, row.correctAnswer, row.chosenAnswer, 
                    notiFired, row.isCorrect, row.reactionTimeMs, row.deviceOS
                ];
                csvRows.push(values.join(','));
            });

            const csvContent = "\uFEFF" + csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `math_task_data_${expNum}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
