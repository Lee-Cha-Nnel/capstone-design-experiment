<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="인지 실험">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">

    <title>알림 방해 인지 실험 (Stroop Task)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #050505 !important;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #050505;
        }
        .screen.active {
            display: flex;
        }

        .stroop-text {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            user-select: none;
            text-align: center;
        }

        /* 📱 최신 안드로이드 알약(Pill) 팝업 알림 스타일 - 노치 버그 완벽 수정 */
        .modern-pill-notification {
            position: absolute;
            top: 0; /* 기준점을 맨 위로 변경 */
            left: 50%;
            /* 화면 밖으로 150px 완전히 치워둠 (잔상 버그 해결) */
            transform: translate(-50%, -150px);
            width: fit-content;
            max-width: 92%;
            background-color: rgba(112, 112, 112, 0.95); /* #707070 색상 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 9999px; 
            padding: 5px 10px 5px 5px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .modern-pill-notification.show {
            /* 나타날 때는 안전영역만큼만 내려옴 */
            transform: translate(-50%, calc(env(safe-area-inset-top, 10px) + 12px));
        }

        .tap-effect:active {
            opacity: 0.7;
            transform: scale(0.96);
        }
        
        .color-btn {
            transition: transform 0.1s;
        }
        .color-btn:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <!-- ================= 1. 최신 알약 알림 UI ================= -->
    <div id="notification" class="modern-pill-notification">
        <div id="noti-icon-container" class="w-[28px] h-[28px] rounded-[10px] flex-shrink-0 flex items-center justify-center relative overflow-hidden shadow-sm"></div>
        <div class="flex items-center gap-1.5 flex-1 overflow-hidden whitespace-nowrap px-1">
            <span id="noti-title" class="font-bold text-[13.5px] text-white truncate max-w-[120px]"></span>
            <span id="noti-msg" class="text-[13.5px] text-white truncate opacity-90"></span>
        </div>
        <svg class="w-[14px] h-[14px] text-gray-300 ml-1 flex-shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
        </svg>
    </div>

    <!-- ================= 2. 시작 화면 ================= -->
    <div id="screen-intro" class="screen active p-6">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full">
            <h1 class="text-3xl font-bold mb-4 text-white">인지 반응 검사</h1>
            <p class="text-gray-400 mb-8 text-center text-[15px] leading-relaxed">
                화면 중앙에 나타나는 단어의 <strong>'의미'</strong>가 아닌,<br>
                글자의 <strong class="text-white">'실제 색상'</strong>에 해당하는 하단 버튼을<br>
                최대한 빨리 눌러주세요.
            </p>
            
            <div class="bg-[#1f1f1f] p-5 rounded-2xl shadow-sm w-full mb-8 border border-gray-700">
                <p class="text-xs text-gray-400 mb-3 font-semibold">예시 연습:</p>
                <div class="flex justify-center items-center gap-4 mb-1">
                    <span class="text-2xl font-bold tracking-widest" style="color: #0A3BB8;">빨강</span>
                    <span class="text-xl">👉</span>
                    <span class="text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md" style="background-color: #0A3BB8;">파랑 버튼</span>
                </div>
                <p class="text-[11px] text-gray-500 text-center mt-3">* 테스트 도중 상단 알림이 발생할 수 있습니다.</p>
            </div>

            <div class="w-full mb-8">
                <input type="text" id="participant-id" placeholder="참가자 번호 (예: 1000)" class="w-full px-5 py-4 rounded-2xl bg-[#1f1f1f] border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-[#4B7DD1] focus:ring-1 focus:ring-[#4B7DD1] transition-all text-center text-lg">
            </div>

            <button id="btn-start" class="tap-effect w-full py-4 bg-white text-black font-bold rounded-2xl text-xl shadow-[0_0_20px_rgba(255,255,255,0.15)]">
                실험 시작
            </button>
            
            <!-- 전체화면 전환 버튼 복구 완료 -->
            <button id="btn-fullscreen" class="mt-6 text-sm text-gray-500 underline tap-effect">
                전체화면으로 전환
            </button>

            <!-- 깃허브 전체화면 안내 문구 (선택 사항) -->
            <div class="mt-8 px-4 py-3 bg-[#1f1f1f] rounded-2xl border border-gray-800 text-[11px] text-gray-400 text-center w-full">
                전체 화면을 종료하려면 상단에서 드래그한 후 뒤로 가기를 터치하세요.
            </div>
        </div>
    </div>

    <!-- ================= 3. 대기 화면 ================= -->
    <div id="screen-fixation" class="screen justify-center items-center">
        <div class="text-5xl text-gray-600 font-light">+</div>
    </div>

    <!-- ================= 4. 본 실험 화면 ================= -->
    <div id="screen-task" class="screen">
        <div class="pt-12 px-6 flex justify-between items-center z-10">
            <div class="w-full bg-[#2a2a2a] rounded-full h-1.5">
                <div id="progress-bar" class="bg-gray-400 h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <span class="text-xs text-gray-500 font-bold ml-4 whitespace-nowrap"><span id="trial-counter">1</span> / <span id="total-trials">20</span></span>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div id="target-word" class="stroop-text drop-shadow-md"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-5 pb-10">
            <button class="color-btn py-12 rounded-[1.8rem] shadow-md" data-color="red" style="background-color: #A2201C;"></button>
            <button class="color-btn py-12 rounded-[1.8rem] shadow-md" data-color="blue" style="background-color: #0A3BB8;"></button>
            <button class="color-btn py-12 rounded-[1.8rem] shadow-md" data-color="green" style="background-color: #187A1E;"></button>
            <button class="color-btn py-12 rounded-[1.8rem] shadow-md" data-color="yellow" style="background-color: #976214;"></button>
        </div>
    </div>

    <!-- ================= 5. 결과 화면 ================= -->
    <div id="screen-result" class="screen p-6">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full text-center">
            <div class="w-24 h-24 bg-[#187A1E] text-white rounded-full flex items-center justify-center text-5xl mb-8 mx-auto shadow-lg">
                ✓
            </div>
            <h2 class="text-3xl font-bold mb-3 text-white">실험 종료</h2>
            <p class="text-gray-400 mb-12 text-[15px]">수고하셨습니다. 측정이 완료되었습니다.</p>
            
            <div class="w-full space-y-4">
                <button id="btn-download" class="tap-effect w-full py-4 bg-[#0A3BB8] text-white font-bold rounded-2xl text-lg shadow-lg">
                    데이터 다운로드 (CSV)
                </button>
                <button id="btn-restart" class="tap-effect w-full py-4 bg-[#1f1f1f] text-white font-bold rounded-2xl text-lg border border-gray-700">
                    다시 하기
                </button>
            </div>
        </div>
    </div>

    <script>
        // ================= Supabase DB 연결 =================
        const SUPABASE_URL = 'https://invtltgtuhhqzaqjkkfj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_n-VzUf2TqU-UnSJFJPYsYQ_bXN2j9g8';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ================= 설정 및 데이터 =================
        const CONFIG = {
            totalTrials: 20,             
            fixationTime: 600,           
            notiProbability: 0.25,       
            notiDuration: 4000           
        };

        const COLORS = [
            { id: 'red', name: '빨강', hex: '#A2201C' },
            { id: 'blue', name: '파랑', hex: '#0A3BB8' },
            { id: 'green', name: '초록', hex: '#187A1E' },
            { id: 'yellow', name: '노랑', hex: '#976214' }
        ];

        // 인스타그램 로고 SVG 및 그라데이션 완벽 반영
        const ICONS = {
            instagram: `<div class="absolute inset-0" style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);"></div>
                        <svg class="relative z-10 w-[18px] h-[18px] text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5.5" ry="5.5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-width="3"></line>
                        </svg>`,
            kakaotalk: `<div class="absolute inset-0 bg-[#FEE500]"></div>
                        <svg class="relative z-10 w-[16px] h-[16px] text-[#3A1D1D]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-5.523 0-10 3.582-10 8 0 2.864 1.838 5.373 4.605 6.825l-1.127 4.195 4.832-3.17c1.1.282 2.277.45 3.69.45 5.523 0 10-3.582 10-8s-4.477-8-10-8z"/></svg>`
        };

        const NOTIFICATIONS = [
            { iconHtml: ICONS.instagram, title: 'User_o4o6', msg: '지훈 ㅋㅋㅋㅋㅋㅋㅋㅋ' },
            { iconHtml: ICONS.kakaotalk, title: '경상국립대학교', msg: '사진을 보냈습니다.' }
        ];

        let currentTrial = 0;
        let participantId = "";
        let trialData = [];
        let currentTargetColorId = "";
        let currentTargetWord = "";
        let trialStartTime = 0;
        let isNotiVisible = false;
        let notiTimeout = null;

        const screens = {
            intro: document.getElementById('screen-intro'),
            fixation: document.getElementById('screen-fixation'),
            task: document.getElementById('screen-task'),
            result: document.getElementById('screen-result')
        };
        const targetWordEl = document.getElementById('target-word');
        const trialCounterEl = document.getElementById('trial-counter');
        const progressBarEl = document.getElementById('progress-bar');
        const notiEl = document.getElementById('notification');

        document.getElementById('total-trials').textContent = CONFIG.totalTrials;

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function showRandomNotification() {
            if (isNotiVisible) return;
            
            const noti = NOTIFICATIONS[Math.floor(Math.random() * NOTIFICATIONS.length)];
            document.getElementById('noti-icon-container').innerHTML = noti.iconHtml;
            document.getElementById('noti-title').textContent = noti.title;
            document.getElementById('noti-msg').textContent = noti.msg;
            
            notiEl.classList.add('show');
            isNotiVisible = true;

            if (notiTimeout) clearTimeout(notiTimeout);
            notiTimeout = setTimeout(() => {
                hideNotification();
            }, CONFIG.notiDuration);
        }

        function hideNotification() {
            notiEl.classList.remove('show');
            isNotiVisible = false;
        }

        // 전체화면 전환 로직
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`전체화면을 지원하지 않는 브라우저입니다: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('btn-start').addEventListener('click', () => {
            participantId = document.getElementById('participant-id').value || `Subj_${Math.floor(Math.random()*10000)}`;
            currentTrial = 0;
            trialData = [];
            progressBarEl.style.width = '0%';
            hideNotification();
            nextTrial();
        });

        function nextTrial() {
            if (currentTrial >= CONFIG.totalTrials) {
                endExperiment();
                return;
            }
            currentTrial++;
            trialCounterEl.textContent = currentTrial;
            progressBarEl.style.width = `${(currentTrial / CONFIG.totalTrials) * 100}%`;
            
            showScreen('fixation');

            setTimeout(() => {
                presentStimulus();
            }, CONFIG.fixationTime);
        }

        function presentStimulus() {
            showScreen('task');
            
            const wordObj = COLORS[Math.floor(Math.random() * COLORS.length)];
            let colorObj = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            if (Math.random() > 0.3 && wordObj.id === colorObj.id) {
                const otherColors = COLORS.filter(c => c.id !== wordObj.id);
                colorObj = otherColors[Math.floor(Math.random() * otherColors.length)];
            }

            currentTargetWord = wordObj.name;
            currentTargetColorId = colorObj.id;
            const isCongruent = (wordObj.id === colorObj.id);

            targetWordEl.textContent = currentTargetWord;
            targetWordEl.style.color = colorObj.hex;

            let notiTriggeredOnThisTrial = false;
            if (!isNotiVisible && Math.random() < CONFIG.notiProbability) {
                setTimeout(() => { showRandomNotification(); }, 150); 
                notiTriggeredOnThisTrial = true;
            }

            trialStartTime = performance.now();

            trialData[currentTrial - 1] = {
                participantId: participantId,
                trialNumber: currentTrial,
                word: currentTargetWord,
                color: colorObj.name,
                condition: isCongruent ? 'Congruent' : 'Incongruent',
                notificationPresent: (isNotiVisible || notiTriggeredOnThisTrial) ? 'Yes' : 'No'
            };
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('touchstart', handleInput, {passive: false});
            btn.addEventListener('mousedown', handleInput); 
        });

        function handleInput(e) {
            if (screens.task.classList.contains('active') === false) return;
            e.preventDefault(); 

            const reactionTime = Math.round(performance.now() - trialStartTime);
            const selectedColorId = e.currentTarget.getAttribute('data-color');
            const isCorrect = (selectedColorId === currentTargetColorId);
            
            const phaseNum = isNotiVisible ? 1 : 0;

            trialData[currentTrial - 1].responseColorId = selectedColorId;
            trialData[currentTrial - 1].isCorrect = isCorrect ? 1 : 0;
            trialData[currentTrial - 1].reactionTimeMs = reactionTime;

            // DB 전송
            if (db) {
                db.from('Trials').insert([
                    { 
                        participant_id: participantId, 
                        trial_number: currentTrial, 
                        notification_phase: phaseNum,
                        reaction_time_ms: reactionTime,
                        is_correct: isCorrect 
                    }
                ]).then(({ error }) => {
                    if (error) console.error('DB 전송 에러:', error);
                });
            }

            nextTrial();
        }

        function endExperiment() {
            hideNotification();
            showScreen('result');
        }

        notiEl.addEventListener('click', () => {
            hideNotification();
            if(notiTimeout) clearTimeout(notiTimeout);
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            if (trialData.length === 0) return;

            const headers = ['Participant_ID', 'Trial', 'Word_Meaning', 'Ink_Color', 'Condition', 'Notification_Active', 'Correct', 'Reaction_Time_ms'];
            const csvRows = [headers.join(',')];

            trialData.forEach(row => {
                const values = [
                    row.participantId,
                    row.trialNumber,
                    row.word,
                    row.color,
                    row.condition,
                    row.notificationPresent,
                    row.isCorrect,
                    row.reactionTimeMs
                ];
                csvRows.push(values.join(','));
            });

            const csvContent = "\uFEFF" + csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `stroop_data_${participantId}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            showScreen('intro');
        });
    </script>
</body>
</html>
