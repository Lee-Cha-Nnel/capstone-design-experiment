<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="인지 실험">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">

    <title>알림 방해 인지 실험 (산수 과제 & 관리자 모드)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #050505 !important;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #050505;
        }
        .screen.active {
            display: flex;
        }

        .math-text {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            user-select: none;
            text-align: center;
        }

        /* 📱 인스타그램 다크모드 99.9% 싱크로율 튜닝 */
        .modern-pill-notification {
            position: absolute;
            top: 0; 
            left: 50%;
            transform: translate(-50%, -150px);
            width: fit-content;
            max-width: 90%;
            background-color: #212121; /* 스크린샷 픽셀 추출 색상 (무광 다크그레이) */
            border-radius: 9999px; 
            padding: 4px 14px 4px 4px; /* 위아래 패딩을 4px로 줄여 세로폭을 아주 슬림하게 변경 */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 9999;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .modern-pill-notification.show {
            transform: translate(-50%, calc(env(safe-area-inset-top, 10px) + 16px));
        }

        .tap-effect:active {
            opacity: 0.7;
            transform: scale(0.96);
        }
        
        .color-btn { 
            transition: transform 0.1s; 
            font-size: 2.5rem !important; 
        }
        .color-btn:active { transform: scale(0.92); }

        .custom-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            background-color: #1f1f1f;
            border: 1px solid #374151;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .custom-input:focus {
            outline: none;
            border-color: #4B7DD1;
            box-shadow: 0 0 0 1px #4B7DD1;
        }
        .custom-input::placeholder { color: #6b7280; }

        .admin-table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .admin-table-container::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        .admin-table-container::-webkit-scrollbar-track { background: #1f1f1f; }
    </style>
</head>
<body>

    <div id="notification" class="modern-pill-notification">
        <div id="noti-icon-container" class="w-[24px] h-[24px] flex-shrink-0 flex items-center justify-center relative overflow-hidden rounded-full"></div>
        <div class="flex items-center flex-1 overflow-hidden whitespace-nowrap pl-2.5 pr-1">
            <span id="noti-title" class="font-bold text-[13px] text-white tracking-tight flex-shrink-0"></span>
            <span id="noti-msg" class="text-[13px] text-[#9A9A9A] truncate font-normal tracking-tight ml-1.5"></span>
        </div>
        <svg class="w-[11px] h-[11px] text-[#6B6B6B] ml-1 flex-shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9l6 6 6-6"></path>
        </svg>
    </div>

    <div id="screen-intro" class="screen active p-6 overflow-y-auto">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full py-6">
            <h1 class="text-3xl font-bold mb-3 text-white">실험 검사</h1>
            <p class="text-gray-400 mb-6 text-center text-[14px] leading-relaxed">
                화면 중앙에 나타나는 <strong>'수식의 정답'</strong>을 계산하여<br>
                하단의 4개 버튼 중 알맞은 숫자를 빠르게 누르세요.
            </p>
            
            <div class="w-full bg-[#121212] p-5 rounded-2xl mb-8 border border-gray-800 shadow-lg">
                <p class="text-center mb-5">
                    <span class="text-pink-500/90 text-[12px] font-medium">(※ 입력된 정보는 실험용으로만 쓰이며 즉시 파기됩니다.)</span>
                </p>
                
                <div class="space-y-4">
                    <div>
                        <label for="exp-number" class="block text-[12.5px] font-medium text-gray-500 mb-1.5 ml-1">1. 실험번호 (연구자 안내)</label>
                        <input type="text" id="exp-number" class="custom-input py-3.5" placeholder="예: 1000">
                    </div>
                    <div>
                        <label for="my-id" class="block text-[12.5px] font-medium text-gray-500 mb-1.5 ml-1">2. 본인 인스타 계정</label>
                        <input type="text" id="my-id" class="custom-input py-3.5" placeholder="예: user_123">
                    </div>
                    <div>
                        <label for="lover-name" class="block text-[12.5px] font-medium text-gray-500 mb-1.5 ml-1">3. 가장 자주 DM을 하는 지인/애인</label>
                        <input type="text" id="lover-name" class="custom-input py-3.5" placeholder="예: @my_dear, 우리공주">
                    </div>
                    <div>
                        <label for="ad-name" class="block text-[12.5px] font-medium text-gray-500 mb-1.5 ml-1">4. 평소 자주 보는 브랜드/쇼핑몰</label>
                        <input type="text" id="ad-name" class="custom-input py-3.5" placeholder="예: @musinsa, 올리브영">
                    </div>
                </div>
            </div>

            <button id="btn-start" class="tap-effect w-full py-4 bg-white text-black font-bold rounded-2xl text-xl shadow-[0_0_20px_rgba(255,255,255,0.15)] flex-shrink-0">
                실험 시작
            </button>
            <button id="btn-fullscreen" class="mt-6 text-sm text-gray-500 underline tap-effect flex-shrink-0">
                전체화면으로 전환
            </button>
        </div>
    </div>

    <div id="screen-fixation" class="screen justify-center items-center">
        <div class="text-5xl text-gray-600 font-light">+</div>
    </div>

    <div id="screen-task" class="screen">
        <div class="pt-12 px-6 flex justify-between items-center z-10">
            <div class="w-full bg-[#2a2a2a] rounded-full h-1.5">
                <div id="progress-bar" class="bg-gray-400 h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <span class="text-xs text-gray-500 font-bold ml-4 whitespace-nowrap"><span id="trial-counter">1</span> / <span id="total-trials">20</span></span>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div id="target-equation" class="math-text text-white drop-shadow-md"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-5 pb-10">
            <button id="ans-btn-0" class="color-btn py-12 rounded-[1.8rem] shadow-md font-bold text-white" style="background-color: #A2201C;"></button>
            <button id="ans-btn-1" class="color-btn py-12 rounded-[1.8rem] shadow-md font-bold text-white" style="background-color: #0A3BB8;"></button>
            <button id="ans-btn-2" class="color-btn py-12 rounded-[1.8rem] shadow-md font-bold text-white" style="background-color: #187A1E;"></button>
            <button id="ans-btn-3" class="color-btn py-12 rounded-[1.8rem] shadow-md font-bold text-white" style="background-color: #976214;"></button>
        </div>
    </div>

    <div id="screen-result" class="screen p-6">
        <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full text-center">
            <div class="w-24 h-24 bg-[#187A1E] text-white rounded-full flex items-center justify-center text-5xl mb-8 mx-auto shadow-lg">✓</div>
            <h2 class="text-3xl font-bold mb-3 text-white">실험 종료</h2>
            <p class="text-gray-400 mb-12 text-[15px]">수고하셨습니다. 측정이 완료되었습니다.</p>
            
            <div class="w-full space-y-4">
                <button id="btn-download-local" class="tap-effect w-full py-4 bg-[#0A3BB8] text-white font-bold rounded-2xl text-lg shadow-lg">
                    내 기록 다운로드 (CSV)
                </button>
                <button id="btn-restart" class="tap-effect w-full py-4 bg-[#1f1f1f] text-white font-bold rounded-2xl text-lg border border-gray-700">
                    다시 하기
                </button>
            </div>
        </div>
    </div>

    <div id="screen-admin" class="screen p-6">
        <div class="flex flex-col w-full h-full max-w-5xl mx-auto pt-10 pb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-white">데이터베이스 관리자</h2>
                    <p class="text-sm text-gray-400 mt-1">Supabase 실시간 데이터</p>
                </div>
                <div class="flex gap-2">
                    <button id="btn-admin-refresh" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-sm font-semibold transition-colors">새로고침</button>
                    <button id="btn-admin-close" class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg text-sm font-semibold transition-colors">닫기</button>
                </div>
            </div>

            <div class="flex-1 overflow-auto admin-table-container bg-[#1f1f1f] rounded-xl border border-gray-700 shadow-xl relative">
                <table class="w-full text-left text-[13px] text-gray-300 whitespace-nowrap">
                    <thead class="bg-gray-800 text-gray-400 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="p-3 font-semibold">본인계정(ID)</th>
                            <th class="p-3 font-semibold">실험번호(expNum)</th>
                            <th class="p-3 font-semibold">Trial</th>
                            <th class="p-3 font-semibold">알림 발송자</th>
                            <th class="p-3 font-semibold">반응시간(ms)</th>
                            <th class="p-3 font-semibold">정답여부</th>
                            <th class="p-3 font-semibold">저장시간</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-gray-800">
                        <tr><td colspan="7" class="text-center py-10 text-gray-500">데이터를 불러오는 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex justify-between items-center">
                <span id="admin-total-count" class="text-sm text-gray-400">총 데이터: 0 건</span>
                <button id="btn-admin-download-all" class="px-5 py-3 bg-[#4B7DD1] text-white rounded-xl text-sm font-bold shadow-lg tap-effect">
                    ⬇ 전체 데이터 CSV 백업
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 데이터베이스 및 변수 설정
        // ==========================================
        const SUPABASE_URL = 'https://invtltgtuhhqzaqjkkfj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_n-VzUf2TqU-UnSJFJPYsYQ_bXN2j9g8';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const CONFIG = {
            totalTrials: 20,             
            fixationTime: 600,           
            notiDuration: 4000           
        };

        const ICONS = {
            instagram: `<div class="absolute inset-0 rounded-full" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);"></div>
                        <svg class="relative z-10 w-[14px] h-[14px] text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-width="3"></line>
                        </svg>`
        };

        // ------------------------------------------
        // [핵심] 완벽히 통제된 20개 시나리오 세팅
        // ------------------------------------------
        const TRIAL_SCENARIO = [
            { eq: "15 + 23", ans: 38, choices: [48, 38, 27, 39], noti: "None" },
            { eq: "14 × 3",  ans: 42, choices: [42, 32, 52, 45], noti: "None" },
            { eq: "34 + 18", ans: 52, choices: [42, 62, 52, 53], noti: "None" },
            { eq: "21 × 4",  ans: 84, choices: [74, 84, 94, 85], noti: "None" },
            { eq: "45 + 27", ans: 72, choices: [62, 73, 82, 72], noti: "None" },
            { eq: "13 × 6",  ans: 78, choices: [78, 68, 88, 79], noti: "None" },
            { eq: "52 + 19", ans: 71, choices: [81, 71, 61, 72], noti: "None" },
            { eq: "17 × 5",  ans: 85, choices: [75, 95, 85, 86], noti: "None" },
            { eq: "28 + 35", ans: 63, choices: [63, 53, 73, 64], noti: "None" },
            { eq: "24 × 3",  ans: 72, choices: [82, 72, 62, 74], noti: "Target" },
            { eq: "41 + 22", ans: 63, choices: [53, 73, 63, 65], noti: "None" },
            { eq: "16 × 4",  ans: 64, choices: [64, 54, 74, 66], noti: "None" },
            { eq: "37 + 16", ans: 53, choices: [63, 43, 54, 53], noti: "None" },
            { eq: "18 × 3",  ans: 54, choices: [54, 64, 44, 56], noti: "None" },
            { eq: "56 + 25", ans: 81, choices: [71, 81, 91, 83], noti: "None" },
            { eq: "12 × 7",  ans: 84, choices: [94, 74, 84, 86], noti: "None" },
            { eq: "29 + 44", ans: 73, choices: [73, 63, 83, 75], noti: "None" },
            { eq: "23 × 5",  ans: 115, choices: [105, 125, 115, 117], noti: "None" },
            { eq: "48 + 33", ans: 81, choices: [91, 81, 71, 83], noti: "Target" },
            { eq: "19 × 6",  ans: 114, choices: [114, 104, 124, 116], noti: "None" }
        ];

        let currentTrial = 0;
        let trialData = [];
        let trialStartTime = 0;
        
        let isNotiVisible = false;
        let notiTimeout = null;
        let activeNotiType = "None";   
        let activeNotiSender = "None"; 

        let expNum = "";
        let myId = ""; // 추가됨: 본인 인스타 계정
        let loverName = "";
        let adName = "";
        let dynamicNotifications = {}; 

        let currentEquation = "";
        let currentCorrectAnswer = 0;

        let adminDataDump = [];

        const screens = {
            intro: document.getElementById('screen-intro'),
            fixation: document.getElementById('screen-fixation'),
            task: document.getElementById('screen-task'),
            result: document.getElementById('screen-result'),
            admin: document.getElementById('screen-admin')
        };
        const notiEl = document.getElementById('notification');
        const ansBtns = [
            document.getElementById('ans-btn-0'), document.getElementById('ans-btn-1'),
            document.getElementById('ans-btn-2'), document.getElementById('ans-btn-3')
        ];

        // ==========================================
        // 2. 관리자 기능 (Admin)
        // ==========================================
        async function openAdminDashboard() {
            showScreen('admin');
            fetchAdminData();
        }

        async function fetchAdminData() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-gray-500">데이터를 불러오는 중입니다...</td></tr>';
            
            if (db) {
                const { data, error } = await db.from('Trials').select('*').order('created_at', { ascending: false });
                
                if (error) {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-red-500">데이터 호출 실패: ${error.message}</td></tr>`;
                    return;
                }

                adminDataDump = data;
                document.getElementById('admin-total-count').textContent = `총 데이터: ${data.length} 건`;

                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-gray-500">아직 데이터가 없습니다.</td></tr>';
                } else {
                    tbody.innerHTML = data.map(row => {
                        const dateObj = new Date(row.created_at);
                        const timeString = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                        
                        const myIdText = row.participant_id || 'N/A';
                        const expNumText = row.exp_number || 'N/A';
                        const senderText = row.notification_sender || (row.notification_phase === 1 ? '알림발생' : '없음');

                        return `
                            <tr class="hover:bg-gray-800 transition-colors">
                                <td class="p-3 border-b border-gray-800 font-bold text-green-400">${myIdText}</td>
                                <td class="p-3 border-b border-gray-800 font-bold text-blue-400">${expNumText}</td>
                                <td class="p-3 border-b border-gray-800">${row.trial_number}</td>
                                <td class="p-3 border-b border-gray-800">${senderText}</td>
                                <td class="p-3 border-b border-gray-800">${row.reaction_time_ms} ms</td>
                                <td class="p-3 border-b border-gray-800">${row.is_correct ? '<span class="text-green-500">정답</span>' : '<span class="text-red-500">오답</span>'}</td>
                                <td class="p-3 border-b border-gray-800 text-gray-500">${timeString}</td>
                            </tr>
                        `;
                    }).join('');
                }
            }
        }

        document.getElementById('btn-admin-close').addEventListener('click', () => { showScreen('intro'); });
        document.getElementById('btn-admin-refresh').addEventListener('click', fetchAdminData);
        
        document.getElementById('btn-admin-download-all').addEventListener('click', () => {
            if (adminDataDump.length === 0) return alert("다운로드할 데이터가 없습니다.");

            const headers = ['DB_ID', 'My_ID', 'Exp_Num', 'Lover_Name', 'Ad_Name', 'Trial', 'Noti_Type', 'Noti_Sender', 'Noti_Phase', 'Reaction_Time_ms', 'Is_Correct', 'Created_At'];
            const csvRows = [headers.join(',')];

            adminDataDump.forEach(row => {
                const values = [
                    row.id, row.participant_id, row.exp_number, row.lover_name, row.ad_name, 
                    row.trial_number, row.notification_type, row.notification_sender, row.notification_phase, 
                    row.reaction_time_ms, row.is_correct, row.created_at
                ];
                csvRows.push(values.join(','));
            });

            const csvContent = "\uFEFF" + csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `All_Database_Backup.csv`;
            link.click();
        });

        // ==========================================
        // 3. 실험 진행 및 산수 로직
        // ==========================================
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function showSpecificNotification(type) {
            if (isNotiVisible || type === "None" || !dynamicNotifications[type]) return;
            
            const noti = dynamicNotifications[type];
            
            activeNotiType = noti.type;
            activeNotiSender = noti.sender; // DB 저장을 위해 sender 속성 사용

            document.getElementById('noti-icon-container').innerHTML = noti.iconHtml;
            document.getElementById('noti-title').innerHTML = noti.title; // 텍스트 대신 HTML 렌더링
            
            const msgEl = document.getElementById('noti-msg');
            msgEl.innerHTML = noti.msg; // 텍스트 대신 HTML 태그 렌더링
            
            // 타이틀이 비어있을 경우 불필요한 좌측 여백 제거
            if (noti.title === '') {
                msgEl.classList.remove('ml-1.5');
            } else {
                msgEl.classList.add('ml-1.5');
            }
            
            notiEl.classList.add('show');
            isNotiVisible = true;

            if (notiTimeout) clearTimeout(notiTimeout);
            notiTimeout = setTimeout(() => { hideNotification(); }, CONFIG.notiDuration);
        }

        function hideNotification() {
            notiEl.classList.remove('show');
            isNotiVisible = false;
            activeNotiType = "None";
            activeNotiSender = "None";
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            expNum = document.getElementById('exp-number').value.trim();

            if (expNum === '1111') {
                document.getElementById('exp-number').value = '';
                openAdminDashboard();
                return;
            }

            expNum = expNum || `TEST_${Math.floor(Math.random()*1000)}`;
            myId = document.getElementById('my-id').value.trim() || `user_123`;
            loverName = document.getElementById('lover-name').value.trim() || `user_123`;
            adName = document.getElementById('ad-name').value.trim() || `musinsa_official`;

            dynamicNotifications = {
                // [수정됨] 본인 아이디(일반) + 애인 아이디(굵게) + 메시지 텍스트 조합
                'Lover': { 
                    type: 'Lover', 
                    sender: loverName, 
                    iconHtml: ICONS.instagram, 
                    title: '', 
                    msg: `<span class="text-white">${myId}:</span> <span class="font-bold text-white">${loverName}</span> 머하고 있어.` 
                },
                'Ad': { 
                    type: 'Ad', 
                    sender: adName, 
                    iconHtml: ICONS.instagram, 
                    title: adName, 
                    msg: '회원님을 위한 단 하루 특가 쿠폰이 도착했습니다.' 
                },
                'General': { 
                    type: 'General', 
                    sender: 'User_123', 
                    iconHtml: ICONS.instagram, 
                    title: 'User_123', 
                    msg: '안녕하세요' 
                }
            };

            currentTrial = 0;
            trialData = [];
            document.getElementById('progress-bar').style.width = '0%';
            hideNotification();
            nextTrial();
        });

        function nextTrial() {
            if (currentTrial >= CONFIG.totalTrials) {
                endExperiment();
                return;
            }
            currentTrial++;
            document.getElementById('trial-counter').textContent = currentTrial;
            document.getElementById('progress-bar').style.width = `${(currentTrial / CONFIG.totalTrials) * 100}%`;
            
            showScreen('fixation');
            setTimeout(() => { presentStimulus(); }, CONFIG.fixationTime);
        }

        function presentStimulus() {
            showScreen('task');
            
            const currentTrialData = TRIAL_SCENARIO[currentTrial - 1];
            currentEquation = currentTrialData.eq;
            currentCorrectAnswer = currentTrialData.ans;

            document.getElementById('target-equation').textContent = currentEquation;

            for(let i=0; i<4; i++) {
                ansBtns[i].textContent = currentTrialData.choices[i];
                ansBtns[i].setAttribute('data-value', currentTrialData.choices[i]); 
            }

            if (currentTrialData.noti !== "None") {
                let notiType = currentTrialData.noti;
                
                if (notiType === "Target") {
                    let numMatched = expNum.match(/\d+/);
                    let num = numMatched ? parseInt(numMatched[0], 10) : 1; 
                    
                    notiType = (num % 2 === 0) ? "Lover" : "General"; 
                }

                setTimeout(() => { 
                    showSpecificNotification(notiType); 
                }, 500); 
            }

            trialStartTime = performance.now();
        }

        ansBtns.forEach(btn => {
            btn.addEventListener('touchstart', handleInput, {passive: false});
            btn.addEventListener('mousedown', handleInput); 
        });

        function handleInput(e) {
            if (screens.task.classList.contains('active') === false) return;
            e.preventDefault(); 

            const reactionTime = Math.round(performance.now() - trialStartTime);
            const selectedValue = parseInt(e.currentTarget.getAttribute('data-value')); 
            const isCorrect = (selectedValue === currentCorrectAnswer);

            trialData.push({
                expNum: expNum, myId: myId, loverName: loverName, adName: adName,
                trialNumber: currentTrial, equation: currentEquation,
                correctAnswer: currentCorrectAnswer, chosenAnswer: selectedValue,
                notificationType: activeNotiType, notificationSender: activeNotiSender,
                isCorrect: isCorrect ? 1 : 0, reactionTimeMs: reactionTime
            });

            const phaseNum = isNotiVisible ? 1 : 0;

            if (db) {
                db.from('Trials').insert([{ 
                    participant_id: myId,  // 본인 아이디를 participant_id 열에 저장
                    exp_number: expNum,
                    lover_name: loverName,
                    ad_name: adName,
                    notification_type: activeNotiType,
                    notification_sender: activeNotiSender,
                    trial_number: currentTrial, 
                    notification_phase: phaseNum, 
                    reaction_time_ms: reactionTime,
                    is_correct: isCorrect 
                }]).then(({ error }) => {
                    if (error) console.error('DB 전송 에러:', error);
                });
            }

            nextTrial();
        }

        function endExperiment() {
            hideNotification();
            showScreen('result');
        }

        // ==========================================
        // 4. 유틸리티 (다운로드 등)
        // ==========================================
        notiEl.addEventListener('click', () => {
            hideNotification();
            if(notiTimeout) clearTimeout(notiTimeout);
        });

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('btn-restart').addEventListener('click', () => { showScreen('intro'); });

        document.getElementById('btn-download-local').addEventListener('click', () => {
            if (trialData.length === 0) return;
            const headers = ['Exp_Num', 'My_ID', 'Lover_Name', 'Ad_Name', 'Trial', 'Equation', 'Correct_Answer', 'Chosen_Answer', 'Noti_Type', 'Noti_Sender', 'Correct', 'Reaction_Time_ms'];
            const csvRows = [headers.join(',')];

            trialData.forEach(row => {
                const values = [
                    row.expNum, row.myId, row.loverName, row.adName, row.trialNumber, row.equation, row.correctAnswer, row.chosenAnswer, 
                    row.notificationType, row.notificationSender, row.isCorrect, row.reactionTimeMs
                ];
                csvRows.push(values.join(','));
            });

            const csvContent = "\uFEFF" + csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `math_task_data_${expNum}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
