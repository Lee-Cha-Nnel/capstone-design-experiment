<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="알림 테스트">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1a">

    <title>다크모드 알림 시뮬레이터</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            overflow: hidden;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
        }

        .ios-notification {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 10px);
            left: 12px;
            right: 12px;
            background-color: rgba(35, 35, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 14px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transform: translateY(-200%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 9999;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }
        
        .ios-notification.show {
            transform: translateY(0);
        }

        .tap-effect:active {
            opacity: 0.7;
            transform: scale(0.96);
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="notification" class="ios-notification">
        <div id="noti-icon-container" class="w-[38px] h-[38px] rounded-[10px] flex-shrink-0 flex items-center justify-center relative overflow-hidden shadow-sm">
            </div>

        <div class="flex-1 overflow-hidden pt-0.5">
            <div class="flex justify-between items-start mb-0.5">
                <span id="noti-title" class="font-semibold text-[14px] text-white truncate tracking-tight">알림</span>
                <span class="text-[13px] text-gray-400 whitespace-nowrap ml-3 tracking-tight">지금</span>
            </div>
            <div id="noti-msg" class="text-[14px] text-gray-200 leading-[1.3] tracking-tight line-clamp-2">
                메시지 내용이 여기에 표시됩니다.
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-12">
            <div class="w-20 h-20 bg-gray-800 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg border border-gray-700">
                <span class="text-4xl">📱</span>
            </div>
            <h1 class="text-2xl font-bold mb-2">실전 알림 시뮬레이터</h1>
            <p class="text-sm text-gray-400">테스트 버튼을 눌러 DB 연동을 확인하세요.</p>
        </div>

        <button id="btn-test-noti" class="tap-effect w-full max-w-xs py-4 bg-white text-black font-bold rounded-2xl text-lg shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all">
            가짜 알림 및 DB 전송
        </button>
        
        <button id="btn-fullscreen" class="mt-8 text-sm text-gray-500 underline tap-effect">
            화면 꽉 채우기 (전체화면)
        </button>
    </div>

    <script>
        // 1. Supabase 설정 (URL은 본인의 것으로 교체하세요)
        const SUPABASE_URL = 'https://invtltgtuhhqzaqjkkfj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_n-VzUf2TqU-UnSJFJPYsYQ_bXN2j9g8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. DB 저장 함수
        async function saveTrialData(trialNum, phase, rt, isCorrect) {
            const { data, error } = await _supabase
                .from('Stroop_Trials') 
                .insert([
                    { 
                        participant_id: 1, 
                        trial_number: trialNum, 
                        notification_phase: phase, // 0: 알림 전, 1: 알림 후
                        reaction_time_ms: rt, 
                        is_correct: isCorrect 
                    }
                ]);

            if (error) console.error('DB 저장 실패:', error);
            else console.log('DB 저장 성공!');
        }

        // 3. 아이콘 디자인 데이터
        const ICONS = {
            instagram: `<div class="absolute inset-0 bg-gradient-to-tr from-[#f09433] via-[#dc2743] to-[#bc1888]"></div><div class="w-[22px] h-[22px] border-[2px] border-white rounded-[6px] flex items-center justify-center relative z-10"><div class="w-[10px] h-[10px] border-[2px] border-white rounded-full"></div><div class="w-[2.5px] h-[2.5px] bg-white rounded-full absolute top-[3px] right-[3px]"></div></div>`,
            kakaotalk: `<div class="absolute inset-0 bg-[#FEE500]"></div><div class="relative z-10 text-[#374151] font-black text-[16px] tracking-tighter mt-1">TALK</div>`,
            toss: `<div class="absolute inset-0 bg-[#3182f6]"></div><div class="relative z-10 text-white font-bold text-[18px]">t</div>`,
            messages: `<div class="absolute inset-0 bg-[#34c759]"></div><div class="relative z-10 w-[22px] h-[20px] bg-white rounded-[8px] flex items-center justify-center"><div class="w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-t-[6px] border-t-white absolute -bottom-[3px] left-[4px] transform rotate-[30deg]"></div></div>`
        };

        const NOTIFICATIONS = [
            { iconHtml: ICONS.instagram, title: 'in.thummmb_95', msg: '회원님을 팔로우하기 시작했습니다.' },
            { iconHtml: ICONS.kakaotalk, title: '김철수', msg: '야 오늘 저녁에 시간 됨? 맛있는거 먹자' },
            { iconHtml: ICONS.toss, title: '토스', msg: '계좌에 50,000원이 입금되었습니다.' },
            { iconHtml: ICONS.messages, title: 'Web발신', msg: '[CJ대한통운] 택배가 배송 완료되었습니다.' }
        ];

        let notiTimeout = null;
        let trialCounter = 1; // 테스트용 카운터
        const notiEl = document.getElementById('notification');

        function showNotification() {
            if (notiTimeout) {
                clearTimeout(notiTimeout);
                notiEl.classList.remove('show');
                setTimeout(() => applyAndShow(), 100);
            } else {
                applyAndShow();
            }

            // 테스트 데이터 전송 (가상의 500ms 반응속도로 전송)
            saveTrialData(trialCounter++, 1, 500, true);
        }

        function applyAndShow() {
            const noti = NOTIFICATIONS[Math.floor(Math.random() * NOTIFICATIONS.length)];
            document.getElementById('noti-icon-container').innerHTML = noti.iconHtml;
            document.getElementById('noti-title').textContent = noti.title;
            document.getElementById('noti-msg').textContent = noti.msg;
            notiEl.classList.add('show');

            notiTimeout = setTimeout(() => {
                notiEl.classList.remove('show');
                notiTimeout = null;
            }, 4500);
        }

        document.getElementById('btn-test-noti').addEventListener('click', showNotification);
        
        notiEl.addEventListener('click', () => {
            notiEl.classList.remove('show');
            if(notiTimeout) { clearTimeout(notiTimeout); notiTimeout = null; }
        });

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {
                    alert('홈 화면에 추가해서 사용해보세요.');
                });
            } else { document.exitFullscreen(); }
        });
    </script>
</body>
</html>
