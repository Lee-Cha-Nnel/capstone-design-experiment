<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인지 실험 데이터 대시보드 (Admin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f3f4f6; }
        .target-row { background-color: #fef9c3 !important; } 
        .target-row:hover { background-color: #fef08a !important; }
        .tap-effect:active { transform: scale(0.95); }
        
        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- 커스텀 모달(팝업) UI -->
    <div id="custom-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[99999] backdrop-blur-sm transition-opacity">
        <div class="bg-white p-7 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform transition-all">
            <h3 id="modal-title" class="text-xl font-extrabold text-gray-800 mb-2">타이틀</h3>
            <p id="modal-desc" class="text-[15px] text-gray-600 mb-6 leading-relaxed">내용</p>
            <div id="modal-input-container" class="hidden mb-6">
                <input type="text" id="modal-input" class="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="입력하세요">
            </div>
            <div class="flex gap-3 justify-end">
                <button id="modal-btn-cancel" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors">취소</button>
                <button id="modal-btn-confirm" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md">확인</button>
            </div>
        </div>
    </div>

    <!-- 1. 상단 네비게이션 바 -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col xl:flex-row justify-between items-center shrink-0 shadow-sm z-10 gap-4">
        <div>
            <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">📊 인지 실험 데이터 대시보드</h1>
            <p class="text-sm text-gray-500 mt-1">알림 방해 효과 (관계성 vs 광고성) 실시간 모니터링</p>
        </div>
        
        <div class="flex items-center gap-4 flex-wrap justify-center">
            <!-- 뷰 전환 탭 (대시보드 vs 전체 표) -->
            <div class="bg-gray-100 p-1.5 rounded-xl flex text-sm font-bold border border-gray-200 shadow-inner">
                <button id="view-dashboard" class="px-4 py-2 bg-white text-gray-800 rounded-lg shadow-sm transition-all">종합 대시보드</button>
                <button id="view-table" class="px-4 py-2 text-gray-500 hover:text-gray-800 rounded-lg transition-all">전체 표 보기</button>
            </div>
            
            <div class="h-8 w-px bg-gray-300 hidden xl:block"></div>
            
            <!-- 우측 액션 버튼들 -->
            <div class="flex space-x-2">
                <button id="btn-refresh" class="tap-effect px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-bold transition-colors shadow-sm" title="새로고침">
                    🔄 새로고침
                </button>
                <button id="btn-download" class="tap-effect px-4 py-2 bg-[#4B7DD1] text-white rounded-lg hover:bg-blue-700 font-bold transition-colors shadow-md">
                    ⬇ CSV
                </button>
                <button id="btn-generate-mock" class="tap-effect px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold transition-colors shadow-md">
                    🧪 가짜 데이터
                </button>
                <button id="btn-delete-all" class="tap-effect px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-bold transition-colors shadow-md" title="전체 삭제">
                    🗑️ 초기화
                </button>
                <button onclick="location.href='index.html'" class="tap-effect px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 font-bold transition-colors shadow-md">
                    🏠 메인으로
                </button>
            </div>
        </div>
    </header>

    <!-- 2. 메인 컨텐츠 영역 -->
    <main class="flex-1 overflow-hidden p-6 lg:p-8 flex flex-col gap-6">
        
        <!-- 요약 위젯 카드 -->
        <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0 transition-all">
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <div class="text-sm text-gray-500 font-semibold mb-1">총 누적 데이터 (Trials)</div>
                <div class="text-3xl font-black text-gray-800" id="stat-total">0</div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <div class="text-sm text-gray-500 font-semibold mb-1">전체 평균 정답률</div>
                <div class="text-3xl font-black text-[#187A1E]" id="stat-accuracy">0%</div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex justify-between items-center">
                <div>
                    <div class="text-sm text-gray-500 font-semibold mb-1">평상시 평균 반응속도 (Baseline)</div>
                    <div class="text-3xl font-bold text-gray-800"><span id="stat-baseline-rt">0</span> <span class="text-base font-normal text-gray-500">ms</span></div>
                </div>
            </div>
        </div>

        <!-- 하단: 그래프 & 데이터 테이블 영역 -->
        <div class="flex flex-col xl:flex-row gap-6 flex-1 min-h-0">
            
            <!-- 실시간 그래프 -->
            <div id="chart-section" class="w-full xl:w-1/3 bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col shrink-0 transition-all duration-300">
                <h3 class="text-lg font-bold text-gray-800 mb-2">📈 알림 발생 시 평균 RT</h3>
                <p class="text-xs text-gray-500 mb-6">11번 문제에서 알림이 발생했을 때 지연 비교</p>
                <div class="relative flex-1 w-full min-h-[250px]">
                    <canvas id="rtChart"></canvas>
                </div>
            </div>

            <!-- 데이터 테이블 영역 -->
            <div id="table-section" class="w-full xl:w-2/3 bg-white rounded-2xl border border-gray-200 shadow-sm flex flex-col overflow-hidden transition-all duration-300">
                
                <!-- 필터 탭 -->
                <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between bg-gray-50/50 shrink-0">
                    <div class="flex space-x-2" id="filter-tabs">
                        <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-bold bg-gray-800 text-white shadow-sm" data-filter="All">전체 데이터</button>
                        <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50" data-filter="Lover">❤️ 관계성 (지인)</button>
                        <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50" data-filter="Ad">🛍️ 광고성 (쇼핑몰)</button>
                    </div>
                    <div class="text-xs font-semibold text-yellow-600 bg-yellow-100 px-3 py-1.5 rounded-full border border-yellow-200 hidden sm:block">
                        💡 노란색 줄은 알림이 발생한 11번 문제입니다.
                    </div>
                </div>

                <!-- 테이블 스크롤 컨테이너 -->
                <div class="flex-1 overflow-y-auto relative">
                    <table class="w-full text-left text-sm text-gray-600 whitespace-nowrap">
                        <thead class="bg-gray-100 text-gray-700 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="py-3 px-4 font-bold">참여자 ID</th>
                                <th class="py-3 px-4 font-bold">그룹 (Type)</th>
                                <th class="py-3 px-4 font-bold">진행</th>
                                <th class="py-3 px-4 font-bold">알림 여부</th>
                                <th class="py-3 px-4 font-bold text-right">반응시간 (RT)</th>
                                <th class="py-3 px-4 font-bold text-center">정답</th>
                                <th class="py-3 px-4 font-bold">참여 일시</th>
                                <th class="py-3 px-4 font-bold text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-200">
                            <tr><td colspan="8" class="text-center py-12 text-gray-400">데이터를 불러오는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // ==========================================
        // 1. Supabase 연동 및 초기 변수
        // ==========================================
        const SUPABASE_URL = 'https://invtltgtuhhqzaqjkkfj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_n-VzUf2TqU-UnSJFJPYsYQ_bXN2j9g8';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let rawData = [];
        let currentFilter = 'All';
        let myChart = null;

        // ==========================================
        // 2. 커스텀 모달(팝업) 시스템
        // ==========================================
        function showModal({ title, desc, type = 'alert', confirmText = '확인', confirmColor = 'bg-blue-600', onConfirm }) {
            const modal = document.getElementById('custom-modal');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const inputContainer = document.getElementById('modal-input-container');
            const inputEl = document.getElementById('modal-input');
            const btnCancel = document.getElementById('modal-btn-cancel');
            const btnConfirm = document.getElementById('modal-btn-confirm');

            titleEl.innerHTML = title;
            descEl.innerHTML = desc;
            inputEl.value = '';
            
            btnConfirm.className = `px-5 py-2.5 text-white rounded-xl font-bold transition-colors shadow-md ${confirmColor} hover:opacity-90`;
            btnConfirm.textContent = confirmText;

            inputContainer.classList.toggle('hidden', type !== 'prompt');
            btnCancel.classList.toggle('hidden', type === 'alert');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const close = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                btnConfirm.onclick = null;
                btnCancel.onclick = null;
            };

            btnCancel.onclick = close;
            btnConfirm.onclick = () => {
                const val = inputEl.value;
                close();
                if (onConfirm) onConfirm(val);
            };
        }

        // ==========================================
        // 3. 뷰 전환 제어 (대시보드 <-> 전체 표)
        // ==========================================
        const btnViewDash = document.getElementById('view-dashboard');
        const btnViewTable = document.getElementById('view-table');
        const chartSection = document.getElementById('chart-section');
        const tableSection = document.getElementById('table-section');

        btnViewDash.addEventListener('click', () => {
            btnViewDash.className = 'px-4 py-2 bg-white text-gray-800 rounded-lg shadow-sm transition-all';
            btnViewTable.className = 'px-4 py-2 text-gray-500 hover:text-gray-800 rounded-lg transition-all';
            
            chartSection.style.display = 'flex'; 
            tableSection.classList.replace('xl:w-full', 'xl:w-2/3'); 
        });

        btnViewTable.addEventListener('click', () => {
            btnViewTable.className = 'px-4 py-2 bg-white text-gray-800 rounded-lg shadow-sm transition-all';
            btnViewDash.className = 'px-4 py-2 text-gray-500 hover:text-gray-800 rounded-lg transition-all';
            
            chartSection.style.display = 'none'; 
            tableSection.classList.replace('xl:w-2/3', 'xl:w-full'); 
        });

        // ==========================================
        // 4. 차트 초기화
        // ==========================================
        Chart.defaults.font.family = "'Pretendard', sans-serif";
        const ctx = document.getElementById('rtChart').getContext('2d');
        
        function initChart() {
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['관계성 (Lover)', '광고성 (Ad)'],
                    datasets: [{
                        label: '평균 반응시간 (ms)',
                        data: [0, 0],
                        backgroundColor: ['#e11d48', '#4B7DD1'], 
                        borderRadius: 6,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: '반응시간 (ms)', font: { weight: 'bold' } } },
                        x: { ticks: { font: { weight: 'bold', size: 13 } } }
                    }
                }
            });
        }
        initChart();

        // ==========================================
        // 5. 데이터 로드 및 통계 계산
        // ==========================================
        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-gray-400 font-bold">데이터를 로드하는 중입니다...</td></tr>';
            
            const { data, error } = await db.from('Trials').select('*').order('created_at', { ascending: false });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-red-500">DB 오류: ${error.message}</td></tr>`;
                return;
            }

            rawData = data;
            
            if(rawData.length === 0) {
                // 더미 데이터 주입 (차트 표시용)
                rawData = [
                    { exp_number: "1001", trial_number: 1, notification_phase: 0, reaction_time_ms: 1200, is_correct: 1, created_at: new Date().toISOString() },
                    { exp_number: "1001", trial_number: 11, notification_phase: 1, notification_type: "Ad", reaction_time_ms: 2800, is_correct: 0, created_at: new Date().toISOString() },
                    { exp_number: "1002", trial_number: 11, notification_phase: 1, notification_type: "Lover", reaction_time_ms: 4500, is_correct: 0, created_at: new Date().toISOString() }
                ];
            }

            updateDashboard();
        }

        function updateDashboard() {
            const total = rawData.length;
            const correctCount = rawData.filter(d => d.is_correct === 1 || d.is_correct === true).length;
            const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            
            const baselines = rawData.filter(d => d.notification_phase === 0);
            const avgBaseline = baselines.length > 0 ? Math.round(baselines.reduce((acc, cur) => acc + cur.reaction_time_ms, 0) / baselines.length) : 0;

            const targets = rawData.filter(d => d.notification_phase === 1);
            const loverTargets = targets.filter(d => d.notification_type === 'Lover');
            const adTargets = targets.filter(d => d.notification_type === 'Ad');
            
            const avgLoverRT = loverTargets.length > 0 ? Math.round(loverTargets.reduce((acc, cur) => acc + cur.reaction_time_ms, 0) / loverTargets.length) : 0;
            const avgAdRT = adTargets.length > 0 ? Math.round(adTargets.reduce((acc, cur) => acc + cur.reaction_time_ms, 0) / adTargets.length) : 0;

            document.getElementById('stat-total').textContent = total.toLocaleString();
            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stat-baseline-rt').textContent = avgBaseline.toLocaleString();

            myChart.data.datasets[0].data = [avgLoverRT, avgAdRT];
            myChart.update();

            renderTable();
        }

        // ==========================================
        // 6. 테이블 렌더링
        // ==========================================
        function renderTable() {
            const tbody = document.getElementById('table-body');
            
            let filteredData = rawData;
            if (currentFilter !== 'All') {
                filteredData = rawData.filter(row => {
                    let num = row.exp_number ? parseInt(row.exp_number.match(/\d+/)?.[0] || "1", 10) : 1;
                    let type = (num % 2 === 0) ? 'Lover' : 'Ad';
                    return type === currentFilter;
                });
            }

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-gray-400">해당 조건의 데이터가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map(row => {
                const dateObj = new Date(row.created_at);
                const timeString = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${String(dateObj.getHours()).padStart(2,'0')}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                
                const expNumText = row.exp_number || 'N/A';
                let num = expNumText.match(/\d+/) ? parseInt(expNumText.match(/\d+/)[0], 10) : 1;
                let groupType = (num % 2 === 0) ? '관계성' : '광고성';
                let groupColor = (groupType === '관계성') ? 'text-pink-600 bg-pink-50' : 'text-blue-600 bg-blue-50';
                
                const isTarget = row.notification_phase === 1;
                const rowClass = isTarget ? 'target-row font-semibold' : 'hover:bg-gray-50 transition-colors';

                return `
                    <tr class="${rowClass} border-b border-gray-100">
                        <td class="py-3 px-4 text-gray-800">${expNumText}</td>
                        <td class="py-3 px-4">
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold ${groupColor}">${groupType}</span>
                        </td>
                        <td class="py-3 px-4">${row.trial_number} / 20</td>
                        <td class="py-3 px-4">
                            ${isTarget ? '📢 알림 O' : '<span class="text-gray-400">-</span>'}
                        </td>
                        <td class="py-3 px-4 font-mono text-right ${isTarget ? 'text-red-600' : 'text-gray-600'}">${row.reaction_time_ms.toLocaleString()}</td>
                        <td class="py-3 px-4 text-center">
                            ${(row.is_correct === 1 || row.is_correct === true) ? '<span class="text-green-600 font-bold">O</span>' : '<span class="text-red-500 font-bold">X</span>'}
                        </td>
                        <td class="py-3 px-4 text-gray-400 text-xs">${timeString}</td>
                        <td class="py-3 px-4 text-center">
                            <button onclick="deleteRow('${row.created_at}')" class="text-gray-400 hover:text-red-500 transition-colors" title="이 기록 삭제하기">
                                🗑️
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ==========================================
        // 7. 이벤트 및 액션 로직
        // ==========================================
        
        // 필터 탭 클릭
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.className = 'filter-btn px-4 py-2 rounded-lg text-sm font-bold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50';
                });
                e.target.className = 'filter-btn active px-4 py-2 rounded-lg text-sm font-bold bg-gray-800 text-white shadow-sm';
                currentFilter = e.target.getAttribute('data-filter');
                renderTable();
            });
        });

        // 새로고침 & 다운로드
        document.getElementById('btn-refresh').addEventListener('click', loadData);
        document.getElementById('btn-download').addEventListener('click', () => {
            if (rawData.length === 0) return showModal({ title: '알림', desc: '다운로드할 데이터가 없습니다.' });
            const headers = ['Exp_Num', 'Group_Type', 'Trial', 'Is_Target(Noti)', 'Reaction_Time_ms', 'Correct(1=O)', 'Created_At']; 
            const csvRows = [headers.join(',')];
            rawData.forEach(row => {
                let num = row.exp_number ? parseInt(row.exp_number.match(/\d+/)?.[0] || "1", 10) : 1;
                let groupType = (num % 2 === 0) ? '관계성' : '광고성';
                let isCorr = (row.is_correct === 1 || row.is_correct === true) ? 1 : 0;
                const values = [row.exp_number, groupType, row.trial_number, row.notification_phase, row.reaction_time_ms, isCorr, row.created_at];
                csvRows.push(values.join(','));
            });
            const blob = new Blob(["\uFEFF" + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `Total_DB_Backup_${new Date().getTime()}.csv`; link.click();
        });

        // 전체 삭제 (모달)
        document.getElementById('btn-delete-all').addEventListener('click', () => {
            showModal({
                title: '⚠️ 전체 데이터 초기화',
                desc: "경고: DB에 쌓인 모든 데이터가 영구 삭제됩니다.<br>정말 지우시려면 아래 창에 <strong>'삭제'</strong>라고 입력해주세요.",
                type: 'prompt',
                confirmText: '영구 삭제',
                confirmColor: 'bg-red-600',
                onConfirm: async (val) => {
                    if (val === '삭제') {
                        const { error } = await db.from('Trials').delete().not('created_at', 'is', null);
                        if (error) {
                            showModal({ title: '오류', desc: '삭제 중 오류가 발생했습니다: ' + error.message });
                        } else {
                            showModal({ title: '성공', desc: '✅ 모든 테스트 데이터가 초기화되었습니다.' });
                            loadData(); 
                        }
                    } else {
                        showModal({ title: '취소됨', desc: '입력이 일치하지 않아 취소되었습니다.' });
                    }
                }
            });
        });

        // 개별 삭제 (모달)
        window.deleteRow = (createdAt) => {
            showModal({
                title: '기록 삭제',
                desc: '이 참가자의 기록(1줄)을 삭제하시겠습니까?',
                type: 'confirm',
                confirmText: '삭제',
                confirmColor: 'bg-red-600',
                onConfirm: async () => {
                    const { error } = await db.from('Trials').delete().eq('created_at', createdAt);
                    if (error) {
                        showModal({ title: '오류', desc: '삭제 중 오류가 발생했습니다: ' + error.message });
                    } else {
                        loadData(); 
                    }
                }
            });
        };

        // 가짜 데이터 자동 생성 (모달)
        document.getElementById('btn-generate-mock').addEventListener('click', () => {
            showModal({
                title: '🧪 가짜 데이터 생성',
                desc: '테스트용 피험자 30명의 데이터(총 600건)를 DB에 자동 생성하시겠습니까?<br>(논문 가설에 맞춘 통계 데이터가 즉시 주입됩니다.)',
                type: 'confirm',
                confirmText: '데이터 생성',
                confirmColor: 'bg-purple-600',
                onConfirm: async () => {
                    const btn = document.getElementById('btn-generate-mock');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '⏳ 생성 중...';
                    btn.disabled = true;

                    const mockTrials = [];
                    const baseTime = new Date().getTime();

                    for(let i=1; i<=30; i++) {
                        const expNum = 1000 + i; 
                        const groupType = (expNum % 2 === 0) ? 'Lover' : 'Ad'; 
                        const pId = `mock_user_${i}`;

                        for(let t=1; t<=20; t++) {
                            const isTarget = (t === 11); // 11번이 타겟 알림
                            let rt, isCorr, notiType, phase;

                            if(isTarget) {
                                phase = 1;
                                notiType = groupType;
                                if(groupType === 'Lover') {
                                    rt = Math.floor(4000 + (Math.random() * 1600 - 800)); 
                                    isCorr = Math.random() > 0.2; // boolean으로 삽입
                                } else {
                                    rt = Math.floor(2500 + (Math.random() * 1000 - 500)); 
                                    isCorr = Math.random() > 0.15; 
                                }
                            } else {
                                phase = 0;
                                notiType = 'None';
                                rt = Math.floor(1200 + (Math.random() * 600 - 300)); 
                                isCorr = Math.random() > 0.05; 
                            }

                            mockTrials.push({
                                participant_id: pId,
                                exp_number: `TEST_${expNum}`,
                                lover_name: 'Mock_Lover',
                                ad_name: 'Mock_Ad',
                                notification_type: notiType,
                                notification_sender: 'Mock_Sender',
                                trial_number: t,
                                notification_phase: phase,
                                reaction_time_ms: rt,
                                is_correct: isCorr,
                                created_at: new Date(baseTime + (i * 20 + t) * 5000).toISOString()
                            });
                        }
                    }

                    try {
                        for(let i=0; i<mockTrials.length; i+=100) {
                            const batch = mockTrials.slice(i, i+100);
                            const { error } = await db.from('Trials').insert(batch);
                            if(error) throw error;
                        }
                        showModal({ title: '성공', desc: '✅ 가짜 데이터 600건이 성공적으로 생성되었습니다!' });
                        loadData(); 
                    } catch(err) {
                        showModal({ title: '오류', desc: '❌ 데이터 생성 중 오류 발생: ' + err.message });
                    } finally {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                }
            });
        });

        // 초기 실행
        loadData();
    </script>
</body>
</html>
